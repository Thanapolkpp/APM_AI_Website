version: "3.9"

services:
  backend:
    build: ./backend
    container_name: Ai_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    restart: always

  frontend:
    build: ./frontend
    container_name: Ai_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    restart: always
